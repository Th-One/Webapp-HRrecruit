<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ตัวอย่างใบสมัคร | HRregister</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/form-paper.css" />
</head>
<body>
  <header class="app-header no-print">
    <div class="app-header-inner">
      <div class="brand">
        <div class="brand-title">HRregister</div>
        <div class="brand-sub">ตัวอย่างใบสมัคร (Preview)</div>
      </div>
      <nav class="nav-links">
        <a href="/" id="back-link">← กลับแก้ไขฟอร์ม</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="hero-strip no-print">
      <h1><span class="hero-emoji">👁️</span>ตัวอย่างใบสมัครก่อนส่ง</h1>
      <p>นี่คือใบสมัครที่จะส่งให้ HR ตรวจดูข้อมูลก่อน หากถูกต้องให้กลับไปกด "บันทึกใบสมัคร" หรือกดพิมพ์/บันทึก PDF ได้เลย</p>
    </div>

    <div class="action-bar no-print">
      <button type="button" class="btn-primary" id="btn-download">📥 บันทึกเป็น PDF</button>
      <button type="button" class="btn-secondary" id="btn-print">🖨️ พิมพ์</button>
      <button type="button" class="btn-secondary" id="btn-back">← กลับแก้ไขฟอร์ม</button>
    </div>

    <div id="detail"></div>
  </main>

  <div class="toast" id="toast" role="status"></div>
  <script src="/js/paper-render.js"></script>
  <script src="/js/preview.js"></script>
</body>
</html>
